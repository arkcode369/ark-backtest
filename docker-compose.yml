services:
  ark-backtest-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: ark-backtest-bot:latest
    container_name: ark-backtest-bot
    restart: unless-stopped

    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TZ=Asia/Jakarta

    volumes:
      # Strategy .md files will be saved here
      - ./storage:/storage

    # Health check — confirm process is alive
    healthcheck:
      test: ["CMD-SHELL", "pgrep bot || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
